<svg viewBox="0 0 594 841" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <pattern id="stripes" width="34" height="34" patternTransform="rotate(38)" patternUnits="userSpaceOnUse">
      <rect width="34" height="34" fill="#0c1230"/>
      <rect width="7" height="34" x="0" fill="#00c9a7"/>
      <rect width="7" height="34" x="9" fill="#e91e8c"/>
      <rect width="7" height="34" x="18" fill="#f2c14e"/>
      <rect width="7" height="34" x="27" fill="#2a3a8f"/>
    </pattern>
    <filter id="marble1" x="-30%" y="-30%" width="160%" height="160%">
      <feTurbulence type="fractalNoise" baseFrequency="0.006 0.018" numOctaves="5" seed="24" result="n1"/>
      <feDisplacementMap in="SourceGraphic" in2="n1" scale="150" xChannelSelector="R" yChannelSelector="G" result="d1"/>
      <feTurbulence type="fractalNoise" baseFrequency="0.02 0.05" numOctaves="3" seed="7" result="n2"/>
      <feDisplacementMap in="d1" in2="n2" scale="35" xChannelSelector="R" yChannelSelector="G" result="d2"/>
      <feGaussianBlur in="d2" stdDeviation="0.6"/>
    </filter>
    <clipPath id="heroClip">
      <rect x="42" y="150" width="510" height="470"/>
    </clipPath>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="594" height="841" fill="#EBEDF0"/>

  <!-- organ pipe bars, top left -->
  <g fill="#0c0c0c">
    <rect x="42"  y="45" width="4" height="90"/>
    <rect x="56"  y="30" width="4" height="105"/>
    <rect x="70"  y="55" width="4" height="80"/>
    <rect x="84"  y="20" width="4" height="115"/>
    <rect x="98"  y="60" width="4" height="75"/>
    <rect x="112" y="38" width="4" height="97"/>
    <rect x="126" y="65" width="4" height="70"/>
    <rect x="150" y="42" width="4" height="93"/>
  </g>

  <!-- title block, top right -->
  <g fill="#0c0c0c" text-anchor="end">
    <text x="552" y="55" font-size="34" font-weight="800" letter-spacing="0.5">ABSCHLUSS</text>
    <text x="552" y="90" font-size="34" font-weight="800" letter-spacing="0.5">KONZERT</text>
    <text x="552" y="122" font-size="20" font-weight="400" letter-spacing="1">ORGEL &#183; ST. HEDWIG-KIRCHENMUSIK</text>
  </g>

  <!-- hero marble image -->
  <g clip-path="url(#heroClip)">
    <rect x="42" y="150" width="510" height="470" fill="url(#stripes)" filter="url(#marble1)"/>
  </g>
  <rect x="42" y="150" width="510" height="470" fill="none" stroke="#0c0c0c" stroke-width="0"/>

  <!-- bottom giant name -->
  <g fill="#0c0c0c">
    <text x="40" y="740" font-size="86" font-weight="800" letter-spacing="-1">Niklas</text>
    <text x="40" y="815" font-size="86" font-weight="800" letter-spacing="-1">Lustig</text>
  </g>

  <!-- info block bottom right -->
  <g fill="#0c0c0c" text-anchor="end" font-size="15.5">
    <text x="552" y="668" font-weight="700">Sonntag, 16. August 2026, 19 Uhr</text>
    <text x="552" y="690">Pauluskirche Zehlendorf, Berlin</text>
    <text x="552" y="712">Orgel: Niklas Lustig</text>
    <text x="552" y="748" font-size="12" fill="#3a3a3a">Abschlusskonzert im Rahmen der</text>
    <text x="552" y="765" font-size="12" fill="#3a3a3a">Kirchenmusikausbildung</text>
  </g>
</svg>
